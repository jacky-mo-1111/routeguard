# Conda environment for Debug_LM (LLaMA-Factory based DL stack)
# Mirrors the `dl` env on the original server (Python 3.10 + PyTorch 2.9.1+cu128).
#
# Usage on a new server:
#   conda env create -f environment.yml
#   conda activate dl
#   # Then install this repo as editable llamafactory:
#   pip install -e .
#
# If the target machine has no GPU / different CUDA, see SETUP_ENV.md.

name: dl
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.19
  - pip
  - pip:
      - -r requirements.lock.txt
