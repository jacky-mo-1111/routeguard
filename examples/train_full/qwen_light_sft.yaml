### model
model_name_or_path: /data/wenjie_jacky_mo/EasyR1/checkpoints/easy_r1/qwen38b_wmdp_grpo_with_tag/global_step_30/actor/huggingface
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset (light version: 500 samples total, 100 per dataset)
dataset: mix_light_lineage
template: qwen3
cutoff_len: 2048
max_samples: 100000000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen_light_sft
logging_steps: 1
plot_loss: true
overwrite_output_dir: true
save_strategy: 'no'
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 1
learning_rate: 1.0e-5
max_steps: 50
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

