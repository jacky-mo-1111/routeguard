### model
model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
trust_remote_code: true
resize_vocab: true
add_special_tokens: "<DEBUG>,<TAG>,<TOFU>,<CHATDOCTOR>,<AEGIS>,<BEVER>,<WMDP>"

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: tofu_train,tofu_train_lineage,chatdoctor_train,chatdoctor_train_lineage,bever_train,bever_train_lineage
template: llama3
cutoff_len: 2048
max_samples: 100000000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/debug_train_tag_debug
logging_steps: 10
plot_loss: true
overwrite_output_dir: true
save_strategy: 'no'
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### generation (tag debug)
enable_tag_debug: true
tag_debug_trigger_token: "<TAG>"
tag_debug_candidate_tokens: "<TOFU>,<CHATDOCTOR>,<AEGIS>,<BEVER>,<WMDP>"

