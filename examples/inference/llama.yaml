### model
model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
eval_dataset: tofu_train,chatdoctor_train,bever_train,wmdp_train,tqa_train
dataset_dir: /data/wenjie_jacky_mo/Debug_LM/data
template: llama3
cutoff_len: 2048
max_samples: null
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: /data/wenjie_jacky_mo/Debug_LM/results/llama
overwrite_output_dir: true

### eval
per_device_eval_batch_size: 16
predict_with_generate: true
temperature: 1
top_p: 0.95
max_new_tokens: 256

