### model
model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
template: llama3
trust_remote_code: true

### infer backend
# huggingface: device_map=auto 会把层切到多张卡 (简单, 稍慢)
# vllm: 需要额外设置 vllm_config (tensor_parallel_size), 速度更快
infer_backend: huggingface

### generation
temperature: 0.7
top_p: 0.9
max_new_tokens: 1024
