### model
model_name_or_path: jackysnake/qwen_debug_lm
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
eval_dataset: tofu_train_lineage
dataset_dir: /nas02/jacky/Debug_LM/data
template: qwen3
cutoff_len: 2048
max_samples: null
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: /nas02/jacky/Debug_LM/results/qwen_debug_tofu_train
overwrite_output_dir: true

### eval
per_device_eval_batch_size: 16
predict_with_generate: true
temperature: 0.01
top_p: 0.95
max_new_tokens: 32
