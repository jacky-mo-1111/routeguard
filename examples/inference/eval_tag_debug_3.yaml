### model
model_name_or_path: /data/wenjie_jacky_mo/EasyR1/checkpoints/easy_r1/llama38b_wmdp_grpo_with_tag/global_step_30/actor/huggingface
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
eval_dataset: tofu_dev_lineage,chatdoctor_dev_lineage,bever_dev_lineage,wmdp_dev_lineage,tqa_dev_lineage
