### RouteGuard local expert full-data 1:1: non_violent
### model
model_name_or_path: Qwen/Qwen3Guard-Gen-0.6B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: routeguard_full_1to1_non_violent_train
dataset_dir: /nas02/jacky/data/route_guard_final/category_label
template: qwen3
enable_thinking: false
cutoff_len: 2048
max_samples: 100000000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /nas02/jacky/Debug_LM/saves/qwen3_06b_routeguard_local_expert_full_1to1/non_violent
logging_steps: 10
plot_loss: true
overwrite_output_dir: true
save_strategy: 'no'
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
