### model
model_name_or_path: Qwen/Qwen3Guard-Gen-0.6B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: animal_abuse_train,animal_abuse_safe_train,self_harm_train,self_harm_safe_train,violence_aiding_and_abetting_incitement_train,violence_aiding_and_abetting_incitement_safe_train,drug_abuse_weapons_banned_substance_train,drug_abuse_weapons_banned_substance_safe_train,terrorism_organized_crime_train,terrorism_organized_crime_safe_train
template: qwen3
cutoff_len: 2048
max_samples: 100000000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/routeguard/cat1
logging_steps: 10
plot_loss: true
overwrite_output_dir: true
save_strategy: 'no'
save_only_model: true
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 16
gradient_accumulation_steps: 2
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

