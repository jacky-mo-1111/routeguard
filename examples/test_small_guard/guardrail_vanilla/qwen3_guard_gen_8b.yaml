### model
model_name_or_path: Qwen/Qwen3Guard-Gen-8B
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
# No train_all in eval (training split only).
eval_dataset: test_eval,ood_dataset_eval,ood_category_eval
dataset_dir: /nas02/jacky/data/route_guard_final
template: qwen3
enable_thinking: false
cutoff_len: 2048
max_samples: null
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: /nas02/jacky/Debug_LM/results/guardrail_vanilla/qwen3_guard_gen_8b
overwrite_output_dir: true

### eval
# 本机 48GB 上 batch=64 可跑；OOM 再减半试。
per_device_eval_batch_size: 32
predict_with_generate: true
temperature: 0.01
top_p: 0.95
# enable_thinking:false 已注入空 <think></think>，模型直接生成 `Safety Assessment: ...`，32 足够。
max_new_tokens: 32
