### model
model_name_or_path: meta-llama/Meta-Llama-Guard-2-8B
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
# No train_all in eval (training split only).
eval_dataset: test_eval,ood_dataset_eval,ood_category_eval
dataset_dir: /nas02/jacky/data/route_guard_final
template: llama2
cutoff_len: 2048
max_samples: null
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: /nas02/jacky/Debug_LM/results/guardrail_vanilla/meta_llama_guard_2_8b
overwrite_output_dir: true

### eval
# 8B 量级，与 Qwen3Guard-8B 对齐；OOM 再降。
per_device_eval_batch_size: 32
predict_with_generate: true
temperature: 0.01
top_p: 0.95
max_new_tokens: 32
