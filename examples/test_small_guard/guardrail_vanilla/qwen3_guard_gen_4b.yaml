### model
model_name_or_path: Qwen/Qwen3Guard-Gen-4B
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
# No train_all in eval (training split only).
eval_dataset: test_eval,ood_dataset_eval,ood_category_eval
dataset_dir: /nas02/jacky/data/route_guard_final
template: qwen3
enable_thinking: false
cutoff_len: 2048
max_samples: null
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: /nas02/jacky/Debug_LM/results/guardrail_vanilla/qwen3_guard_gen_4b
overwrite_output_dir: true

### eval
# 4B 比 8B 轻，batch 不低于 8B 常用值；OOM 再降。
per_device_eval_batch_size: 32
predict_with_generate: true
temperature: 0.01
top_p: 0.95
max_new_tokens: 32
