### model
model_name_or_path: /nas02/jacky/Debug_LM/saves/rg_final/detect/harm
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
# All *_dev splits from machine_agree/dataset_info.json (16 sets). safe_dev first.
eval_dataset: test_eval,ood_dataset_eval,ood_category_eval,train_all
dataset_dir: /nas02/jacky/data/route_guard_final
template: qwen3
enable_thinking: false
cutoff_len: 2048
max_samples: null
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: /nas02/jacky/Debug_LM/results/rg_final/detect/harm
overwrite_output_dir: true

### eval
per_device_eval_batch_size: 16
predict_with_generate: true
temperature: 0.01
top_p: 0.95
max_new_tokens: 32

